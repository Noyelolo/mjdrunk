<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mjdrunk game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Нүүр хуудас */
        #intro-screen {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            color: #e94560;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #e94560;
        }

        .btn {
            background-color: #e94560;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #ff2e63;
            transform: translateY(-3px);
        }

        /* Тоглоомын хэсэг */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            text-align: center;
        }

        .game-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            justify-content: center;
        }

        @media (max-width: 600px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Картын эргэх 3D эффект */
        .card-container {
            perspective: 1000px;
            height: 200px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
            border-radius: 10px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .card-front {
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: #fff;
            border: 2px solid #e94560;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .card-back {
            background: linear-gradient(135deg, #e94560, #ff2e63);
            color: white;
            transform: rotateY(180deg);
            font-size: 0.9rem;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1>mjdrunk game</h1>
        <button class="btn" onclick="startGame()">Тоглох</button>
    </div>

    <div id="game-screen">
        <div class="game-header">
            <h2>Картууд</h2>
            <button class="btn" onclick="resetGame()" style="padding: 10px 20px; font-size: 0.9rem;">Дахин эхлүүлэх</button>
        </div>
        <div class="card-grid" id="grid">
            </div>
    </div>

    <script>
        // Таны өмнөх даалгавруудаас түүврийн журмаар оруулсан сан
        const tasks = [
            "Фэйсбүүк чатад ороод онлайн байгаа 3 дахь хүнээс '10к зээлээч' гэж асуу. Чадахгүй бол 4 уу.",
            "Хамгийн сүүлд чат бичсэн хүн рүүгээ 'Би чамд нууцлаг хайртай болчихсон юм шиг байна' гэж бич. Үгүй бол 3 удаа уу.",
            "Инстаграм/Фэйсбүүк стори дээрээ 'Би өнөөдөр жирэмсэн/хүүхэдтэй боллоо' гэж тайлбаргүй постло. 4 уу.",
            "5 дахь харилцах хүн рүүгээ залгаад шалтгаангүйгээр чанга инээгээд утсаа тасал. Үгүй бол 3 уу.",
            "Фэйсбүүкийн хамгийн сүүлийн зураг дээрээ эксээ таг хий. Үгүй бол 2 удаа уу.",
            "Санамсаргүй танил руугаа өөрийнхөө хөлийг зурсан зураг явуул. Чадахгүй бол 4 удаа уу.",
            "Сторис дээрээ 'Надад мөнгө хэрэгтэй байна, 5000₮ шилжүүлээч' гэж постло. Үгүй бол 3 удаа уу.",
            "Ээж аав руугаа залгаад 'Би гадаад явлаа' гэж хэлээд утсаа тасал. 4 удаа уу.",
            "Найз руугаа залгаад 'Таксины мөнгө явуулаач' гэж худлаа ярь. 3 удаа уу.",
            "Баруун талын хүнийхээ магнай дээр уруулын будгаар зүрх зур. 3 удаа уу.",
            "Гадаа гараад анхны хүн рүү гараа даллаж 'Сайн байна уу, хайраа' гэж хашхир. 5 уу.",
            "Тоглоом дуустал утсаа зүүн гараараа барина. Зөрчвөл 1 удаа уу.",
            "Инстаграм стори дээрээ 'Ганц бие хүмүүс чат бичээрэй' гэж постло. 4 уу.",
            "Экс рүүгээ юм бичээд утсаа ширээн дээр доош харуулж тавь. 5 уу.",
            "Найз залуу/охин руугаа залгаад 'Би чамаас салж байна' гэж хэлээд 5 секунд чимээгүй бай. 5 уу."
        ];

        function startGame() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            renderCards();
        }

        function getRandomTasks(num) {
            // Санамсаргүй байдлаар даалгавруудыг хольж сонгох
            const shuffled = [...tasks].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, num);
        }

        function renderCards() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            // Дэлгэц дээр 12 ширхэг карт гаргах (буюу 12 даалгавар)
            const selectedTasks = getRandomTasks(12);

            selectedTasks.forEach((task, index) => {
                const cardContainer = document.createElement('div');
                cardContainer.className = 'card-container';
                
                cardContainer.innerHTML = `
                    <div class="card" onclick="flipCard(this)">
                        <div class="card-front">Карт ${index + 1}</div>
                        <div class="card-back">${task}</div>
                    </div>
                `;
                grid.appendChild(cardContainer);
            });
        }

        function flipCard(card) {
            // Картыг дарахад эргэх эффект
            card.classList.toggle('flipped');
        }

        function resetGame() {
            // Картуудыг шинээр рандомлож дахин ачаалах
            renderCards();
        }
    </script>
</body>
</html>
