<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mjdrunk game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Нүүр хуудас */
        #intro-screen {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            color: #e94560;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #e94560;
        }

        .btn {
            background-color: #e94560;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
            text-transform: uppercase;
            font-weight: bold;
            outline: none;
        }

        .btn:hover {
            background-color: #ff2e63;
            transform: translateY(-3px);
        }

        /* Тоглоомын хэсэг */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .deck-container {
            position: relative;
            width: 100%;
            max-width: 350px;
            height: 450px;
            margin-bottom: 30px;
            perspective: 1000px; /* 3D эффектэд зайлшгүй шаардлагатай */
        }

        /* Овоолсон харагдуулах дэвсгэр картууд */
        .deck-bg-card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(135deg, #0f3460, #16213e);
            border: 3px solid #e94560;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            top: 10px;
            left: 0;
            z-index: 0;
            transform: scale(0.95);
            opacity: 0.7;
        }

        /* Шинэ карт гарч ирэх Animation */
        @keyframes drawCard {
            0% {
                transform: scale(0.7) translateY(50px) rotateY(0deg);
                opacity: 0;
            }
            100% {
                transform: scale(1) translateY(0) rotateY(0deg);
                opacity: 1;
            }
        }

        .animate-in {
            animation: drawCard 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Идэвхтэй дээд талын карт */
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
            cursor: pointer;
            z-index: 1;
            user-select: none;
        }

        /* Карт эргэх төлөв */
        .card.flipped {
            transform: rotateY(180deg);
        }

        /* Карт алга болох хөдөлгөөн */
        .card.slide-out {
            transform: rotateY(180deg) translateY(-100px) scale(0.8);
            opacity: 0;
        }

        /* Картын нүүр болон ар тал */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Ар тал нь эргэхэд харагдахгүй байх */
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            border: 3px solid #e94560;
        }

        .card-front {
            background: linear-gradient(135deg, #0f3460, #16213e);
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
        }

        .card-back {
            background: linear-gradient(135deg, #e94560, #ff2e63);
            color: white;
            font-size: 1.2rem;
            text-align: center;
            line-height: 1.6;
            transform: rotateY(180deg); /* Ар талыг эхэнд нь эргүүлж тавих */
        }

        .card-instruction {
            font-size: 0.85rem;
            margin-top: 15px;
            opacity: 0.8;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .deck-container {
                height: 400px;
            }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1>mjdrunk game</h1>
        <button class="btn" onclick="startGame()">Тоглох</button>
    </div>

    <div id="game-screen">
        <div class="deck-container">
            <div class="deck-bg-card"></div>
            <div class="deck-bg-card" style="top: 5px; transform: scale(0.98); opacity: 0.85;"></div>
            
            <div class="card" id="mainCard" onclick="cardAction()">
                <div class="card-face card-front" id="frontFace">Картаа эргүүл чадахгүй бол 1 уу</div>
                <div class="card-face card-back" id="backFace">Даалгавар энд гарна</div>
            </div>
        </div>
    </div>

    <script>
        const tasks = [
            "Фэйсбүүк чатад ороод онлайн байгаа 3 дахь хүнээс '10к зээлээч' гэж асуу. Чадахгүй бол 4 уу.",
            "Хамгийн сүүлд чат бичсэн хүн рүүгээ 'Би чамд нууцлаг хайртай болчихсон юм шиг байна' гэж бич. Үгүй бол 3 удаа уу.",
            "Инстаграм/Фэйсбүүк стори дээрээ 'Би өнөөдөр жирэмсэн/хүүхэдтэй боллоо' гэж тайлбаргүй постло. 4 уу.",
            "5 дахь харилцах хүн рүүгээ залгаад шалтгаангүйгээр чанга инээгээд утсаа тасал. Үгүй бол 3 уу.",
            "Фэйсбүүкийн хамгийн сүүлийн зураг дээрээ эксээ таг хий. Үгүй бол 2 удаа уу.",
            "Санамсаргүй танил руугаа өөрийнхөө хөлийг зурсан зураг явуул. Чадахгүй бол 4 уу.",
            "Сторис дээрээ 'Надад мөнгө хэрэгтэй байна, 5000₮ шилжүүлээч' гэж постло. Үгүй бол 3 уу.",
            "Ээж аав руугаа залгаад 'Би гадаад явлаа' гэж хэлээд утсаа тасал. 4 удаа уу.",
            "Найз руугаа залгаад 'Таксины мөнгө явуулаач' гэж худлаа ярь. 3 удаа уу.",
            "Баруун талын хүнийхээ магнай дээр уруулын будгаар зүрх зур. 3 удаа уу.",
            "Гадаа гараад анхны хүн рүү гараа даллаж 'Сайн байна уу, хайраа' гэж хашхир. 5 уу.",
            "Тоглоом дуустал утсаа зүүн гараараа барина. Зөрчвөл 1 удаа уу.",
            "Инстаграм стори дээрээ 'Ганц бие хүмүүс чат бичээрэй' гэж постло. 4 уу.",
            "Экс рүүгээ юм бичээд утсаа ширээн дээр доош харуулж тавь. 5 уу.",
            "Найз залуу/охин руугаа залгаад 'Би чамаас салж байна' гэж хэлээд 5 секунд чимээгүй бай. 5 уу."
        ];

        let availableTasks = [...tasks];
        let isRevealed = false;
        let currentTask = "";

        function startGame() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            getNextTask();
        }

        function getNextTask() {
            if (availableTasks.length === 0) {
                availableTasks = [...tasks];
                alert('Бүх даалгаврыг дуусгалаа! Согтож чадаагүй бол даалгавруудыг шинээр эхлүүлж байна.');
            }
            const randomIndex = Math.floor(Math.random() * availableTasks.length);
            currentTask = availableTasks[randomIndex];
            availableTasks.splice(randomIndex, 1);
        }

        function cardAction() {
            const card = document.getElementById('mainCard');

            if (!isRevealed) {
                // Ар талын текстийг шинэчлэх
                document.getElementById('backFace').innerHTML = `${currentTask}<div class="card-instruction">Дараагийн карт руу шилжих бол дарна уу</div>`;
                
                // Картыг эргүүлэх класс нэмэх
                card.classList.add('flipped');
                isRevealed = true;
            } else {
                // Ил гарсан картыг дээш хөөрч алга болгох хөдөлгөөн
                card.classList.add('slide-out');

                setTimeout(() => {
                    // Шинэ даалгавар авах
                    getNextTask();
                    
                    // Картын анхны төлөвт шилжүүлэх (эргэлт болон хөдөлгөөнийг тэгшитгэх)
                    card.className = 'card';
                    
                    // Шинэ карт шинээр гарч ирэх анимаци нэмэх
                    card.classList.add('animate-in');

                    isRevealed = false;

                    // Анимацийн хугацаа дуусахад классыг цэвэрлэх
                    setTimeout(() => {
                        card.classList.remove('animate-in');
                    }, 500);

                }, 500); // Хугацааг слайд гарах хөдөлгөөнтэй тааруулав
            }
        }
    </script>
</body>
</html>
