<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mjdrunk game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Нүүр хуудас */
        #intro-screen {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            color: #e94560;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #e94560;
        }

        .btn {
            background-color: #e94560;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
            text-transform: uppercase;
            font-weight: bold;
            outline: none;
        }

        .btn:hover {
            background-color: #ff2e63;
            transform: translateY(-3px);
        }

        /* Тоглоомын хэсэг */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        /* Ганц картын загвар */
        .card-container {
            perspective: 1000px;
            width: 100%;
            max-width: 350px;
            height: 450px;
            margin-bottom: 30px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease-in-out;
            cursor: pointer;
            border-radius: 20px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 3px solid #e94560;
        }

        .card-front {
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-back {
            background: linear-gradient(135deg, #e94560, #ff2e63);
            color: white;
            transform: rotateY(180deg);
            font-size: 1.2rem;
            text-align: center;
            line-height: 1.6;
        }

        .card-instruction {
            font-size: 0.85rem;
            margin-top: 15px;
            opacity: 0.8;
            font-style: italic;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .card-container {
                height: 400px;
            }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1>mjdrunk game</h1>
        <button class="btn" onclick="startGame()">Тоглох</button>
    </div>

    <div id="game-screen">
        <div class="card-container">
            <div class="card" id="mainCard" onclick="nextTask()">
                <div class="card-front">
                    Карт татах
                    <div class="card-instruction">Дарж даалгавар авна уу</div>
                </div>
                <div class="card-back" id="taskText">Даалгавар энд гарна</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn" onclick="nextTask()" style="padding: 12px 30px; font-size: 1rem;">Дараагийн даалгавар</button>
        </div>
    </div>

    <script>
        // Бүх даалгаврын сан
        const tasks = [
            "Фэйсбүүк чатад ороод онлайн байгаа 3 дахь хүнээс '10к зээлээч' гэж асуу. Чадахгүй бол 4 уу.",
            "Хамгийн сүүлд чат бичсэн хүн рүүгээ 'Би чамд нууцлаг хайртай болчихсон юм шиг байна' гэж бич. Үгүй бол 3 удаа уу.",
            "Инстаграм/Фэйсбүүк стори дээрээ 'Би өнөөдөр жирэмсэн/хүүхэдтэй боллоо' гэж тайлбаргүй постло. 4 уу.",
            "5 дахь харилцах хүн рүүгээ залгаад шалтгаангүйгээр чанга инээгээд утсаа тасал. Үгүй бол 3 уу.",
            "Фэйсбүүкийн хамгийн сүүлийн зураг дээрээ эксээ таг хий. Үгүй бол 2 удаа уу.",
            "Санамсаргүй танил руугаа өөрийнхөө хөлийг зурсан зураг явуул. Чадахгүй бол 4 уу.",
            "Сторис дээрээ 'Надад мөнгө хэрэгтэй байна, 5000₮ шилжүүлээч' гэж постло. Үгүй бол 3 уу.",
            "Ээж аав руугаа залгаад 'Би гадаад явлаа' гэж хэлээд утсаа тасал. 4 удаа уу.",
            "Найз руугаа залгаад 'Таксины мөнгө явуулаач' гэж худлаа ярь. 3 удаа уу.",
            "Баруун талын хүнийхээ магнай дээр уруулын будгаар зүрх зур. 3 удаа уу.",
            "Гадаа гараад анхны хүн рүү гараа даллаж 'Сайн байна уу, хайраа' гэж хашхир. 5 уу.",
            "Тоглоом дуустал утсаа зүүн гараараа барина. Зөрчвөл 1 удаа уу.",
            "Инстаграм стори дээрээ 'Ганц бие хүмүүс чат бичээрэй' гэж постло. 4 уу.",
            "Экс рүүгээ юм бичээд утсаа ширээн дээр доош харуулж тавь. 5 уу.",
            "Найз залуу/охин руугаа залгаад 'Би чамаас салж байна' гэж хэлээд 5 секунд чимээгүй бай. 5 уу."
        ];

        let availableTasks = [...tasks];

        function startGame() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
        }

        function nextTask() {
            const card = document.getElementById('mainCard');
            
            // Хэрэв бүх даалгавар дууссан бол санг дахин шинэчлэх
            if (availableTasks.length === 0) {
                availableTasks = [...tasks];
                alert('Бүх даалгаврыг дуусгалаа! Даалгаврууд шинээр эхэлж байна.');
            }

            // Санамсаргүй индекс олох
            const randomIndex = Math.floor(Math.random() * availableTasks.length);
            const selectedTask = availableTasks[randomIndex];

            // Сонгогдсон даалгаврыг сангаас хасах (ингэснээр давтагдахгүй)
            availableTasks.splice(randomIndex, 1);

            // Картын ар тал руу текстийг шилжүүлж бичих
            document.getElementById('taskText').innerText = selectedTask;

            // Эргэх эффектийг идэвхжүүлэх
            card.classList.add('flipped');

            // Дараагийн дарах үед эффектийг буцааж хураах, гэхдээ текстийг секундийн дараа солихгүйн тулд шууд эргэлтийг хадгалав
            // Дараагийн карт дээр дарахад эхлээд буцааж эргүүлээд шинэ даалгавар оноохын тулд товчлуурыг арай өөрөөр ашиглаж болно.
            // Илүү хялбараар шинэчлэх бол картыг дахин дарахад буцааж эргэдэг байлгаж болно:
            
            setTimeout(() => {
                // Энд дараагийн картыг бэлдэх логик нэмж болно. Одоогийн байдлаар шууд эргээд харагдана.
            }, 500);
        }
    </script>
</body>
</html>
